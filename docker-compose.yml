services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ezlove
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  backend:
    build: ./backend
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/ezlove
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: change-me-in-production
      DEBUG: "true"
    depends_on:
      - db
      - redis

volumes:
  pgdata:
