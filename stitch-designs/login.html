<h1 class="lx-font text-3xl font-bold text-charcoal">易挂念</h1>
</div>
<header class="mb-10 text-center md:text-left">
<h2 class="lx-font text-4xl font-bold text-charcoal mb-2">欢迎回来</h2>
<p class="text-on-surface-variant font-light">请登录您的社区管理账号</p>
</header>
<form class="space-y-6" id="loginForm">
<!-- Phone Input -->
<div class="space-y-1.5">
<label class="text-sm font-semibold text-charcoal ml-1" for="phone">手机号码</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">
                                phone
                            </span>
<input class="w-full pl-12 pr-4 py-4 bg-white border border-outline-variant rounded-xl text-charcoal placeholder:text-outline-variant/60 focus:border-primary transition-all duration-200 shadow-sm" id="phone" name="phone" placeholder="请输入手机号" type="tel"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-1.5">
<label class="text-sm font-semibold text-charcoal ml-1" for="password">登录密码</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">
                                lock
                            </span>
<input class="w-full pl-12 pr-12 py-4 bg-white border border-outline-variant rounded-xl text-charcoal placeholder:text-outline-variant/60 focus:border-primary transition-all duration-200 shadow-sm" id="password" name="password" placeholder="请输入密码" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant hover:text-charcoal transition-colors" id="togglePassword" onclick="togglePasswordVisibility()" type="button">
<span class="material-symbols-outlined" id="eyeIcon">visibility</span>
</button>
</div>
</div>
<!-- Actions -->
<div class="flex items-center justify-between pt-2">
<label class="flex items-center space-x-2 cursor-pointer group">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary/20" type="checkbox"/>
<span class="text-sm text-on-surface-variant group-hover:text-charcoal transition-colors">记住账号</span>
</label>
<a class="text-sm text-primary hover:underline font-medium transition-all" href="#">短信验证码登录</a>
</div>
<!-- Submit Button -->
<button class="w-full py-4 bg-primary text-white font-semibold rounded-full shadow-lg shadow-primary/20 hover:bg-terracotta hover:shadow-xl hover:-translate-y-0.5 active:scale-95 transition-all duration-200" type="submit">
                        立即登录
                    </button>
</form>
<footer class="mt-12 text-center">
<p class="text-xs text-outline font-light">
                        忘记密码？<a class="text-on-surface-variant hover:text-charcoal hover:underline font-medium transition-colors" href="#">联系系统管理员</a>
</p>
<div class="mt-12 flex justify-center space-x-6">
<span class="text-[10px] text-outline-variant uppercase tracking-widest">© 2024 EZLove Technology</span>
</div>
</footer>
</div>
</section>
</main>
<script>
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.innerText = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerText = 'visibility';
            }
        }

        // Add subtle interaction effect to circles
        document.addEventListener('mousemove', (e) => {
            const circles = document.querySelectorAll('.decorative-circle');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;

            circles.forEach((circle, index) => {
                const speed = (index + 1) * 10;
                const moveX = x * speed;
                const moveY = y * speed;
                circle.style.transform = `translate(${moveX}px, ${moveY}px)`;
            });
        });

        // Form submission micro-interaction
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            btn.innerText = '登录中...';
            btn.disabled = true;
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.disabled = false;
                btn.classList.remove('opacity-80', 'cursor-not-allowed');
                // Normally redirect here
            }, 1500);
        });
    </script>
